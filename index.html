<!DOCTYPE html>
<html>
<head>
    <title>Catify Everything Extension</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            padding:50px;
            background:#f3eee2;
        }

        .card{
            max-width:700px;
            margin:auto;
            background:white;
            border:4px solid black;
            padding:30px;
            box-shadow:8px 8px 0 black;
        }

        img{
            width:250px;
            margin:20px 0;
        }

        h1{
            font-size:48px;
        }

        p{
            font-size:20px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Catify Everything</h1>

    <img src="https://cdn2.thecatapi.com/images/MTY3ODIyMQ.jpg">

    <p>
        A Chrome Extension built using Manifest V3 that replaces all images
        on web pages with random cat images fetched from TheCatAPI.
    </p>

    <h2>Features</h2>

    <p>✅ Manifest V3</p>
    <p>✅ Random Cat Images</p>
    <p>✅ Dynamic Image Replacement</p>
    <p>✅ Works Across Websites</p>
</div>

</body>
</html>
